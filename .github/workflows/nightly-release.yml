name: Release

# Two triggers, both converging on the same build + sign + publish job:
#   - `workflow_dispatch` (manual button in the GitHub Actions UI)
#   - `push.tags: v*` (used by the monorepo-root `release-all.sh`
#     orchestrator — this is the canonical release path)
#
# The schedule trigger was removed: cosign-keyless signing requires the
# Fulcio cert subject to match `refs/tags/v*` (enforced by
# `src/upgrade_profile.rs::ALLOWED_SIGNERS` on every deployed gateway),
# and a `schedule` run from `main` produces a `refs/heads/main` cert
# that fails verification. `release-all.sh` pushes the tag and lets the
# `push.tags` trigger fire the workflow under the correct ref.
#
# Filename `nightly-release.yml` is preserved on disk because it is
# hard-coded into the Sigstore identity allowlist
# (`src/upgrade_profile.rs::ALLOWED_SIGNERS`) and the `cosign verify-blob`
# regex below — renaming would lock every deployed gateway out of
# accepting future signed manifests.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # Required for Sigstore keyless signing — Fulcio mints a short-lived
  # cert against the workflow run's OIDC identity. The gateway's
  # `ALLOWED_SIGNERS` allowlist (in `src/upgrade_profile.rs`) pins this
  # exact workflow path; a typo here will fail the signature check on
  # every running gateway.
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
      should_release: ${{ steps.check_release.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}, tag: ${TAG}"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release found for ${TAG}. Will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact_suffix: x86_64-linux
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact_suffix: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout bilbycast-gateway-sdk (path dependency)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-gateway-sdk
          path: bilbycast-gateway-sdk

      - name: Checkout bilbycast-appear-x-api-gateway
        uses: actions/checkout@v5
        with:
          path: bilbycast-appear-x-api-gateway

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bilbycast-appear-x-api-gateway/target
          key: ${{ matrix.target }}-cargo-appear-x-${{ hashFiles('bilbycast-appear-x-api-gateway/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-appear-x-

      - name: Build release binary
        working-directory: bilbycast-appear-x-api-gateway
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          BINARY="bilbycast-appear-x-api-gateway/target/${{ matrix.target }}/release/bilbycast-appear-x-api-gateway"
          # Staging directory keeps the version so the unpacked folder is
          # self-identifying (`bilbycast-appear-x-api-gateway-0.9.0-x86_64-linux/`).
          STAGE="bilbycast-appear-x-api-gateway-${VERSION}-${{ matrix.artifact_suffix }}"
          mkdir -p "${STAGE}"
          cp "${BINARY}" "${STAGE}/bilbycast-appear-x-api-gateway"
          chmod +x "${STAGE}/bilbycast-appear-x-api-gateway"

          # Ship licence + readme alongside the binary.
          cp bilbycast-appear-x-api-gateway/LICENSE   "${STAGE}/LICENSE"
          cp bilbycast-appear-x-api-gateway/NOTICE    "${STAGE}/NOTICE"
          cp bilbycast-appear-x-api-gateway/README.md "${STAGE}/README.md"

          # Bundle the operator install bundle inside the tarball so a
          # node bootstrapped from the curl-pipe-bash flow can locate
          # the systemd unit + scripts without going back to the
          # internet (offline / air-gapped reinstalls).
          if [ -d bilbycast-appear-x-api-gateway/packaging ]; then
            cp -r bilbycast-appear-x-api-gateway/packaging "${STAGE}/packaging"
          fi

          if [ -d bilbycast-appear-x-api-gateway/config ]; then
            cp -r bilbycast-appear-x-api-gateway/config "${STAGE}/config"
          fi

          # Tarball name is *versionless* so /releases/latest/download/<asset>
          # always resolves to the most recent release — matches every other
          # release workflow in the bilbycast monorepo.
          TARBALL="bilbycast-appear-x-api-gateway-${{ matrix.artifact_suffix }}.tar.gz"
          tar czf "${TARBALL}" "${STAGE}"
          sha256sum "${TARBALL}" > "${TARBALL}.sha256"
          echo "Packaged ${TARBALL} ($(du -h ${TARBALL} | cut -f1))"
          ls -l "${TARBALL}" "${TARBALL}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bilbycast-appear-x-api-gateway-${{ matrix.artifact_suffix }}
          path: |
            bilbycast-appear-x-api-gateway-${{ matrix.artifact_suffix }}.tar.gz
            bilbycast-appear-x-api-gateway-${{ matrix.artifact_suffix }}.tar.gz.sha256
          retention-days: 1

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      # Checkout into a named subdir so the packaging/ + LICENSE refs
      # in `gh release create` below resolve. Matches the build job's
      # checkout layout for consistency.
      - name: Checkout bilbycast-appear-x-api-gateway
        uses: actions/checkout@v5
        with:
          path: bilbycast-appear-x-api-gateway

      # The shared manifest builder lives in the SDK repo so every
      # vendor sidecar uses the same canonicalisation logic. Pull it
      # into the runner so the build step below can call it.
      - name: Checkout bilbycast-gateway-sdk (manifest script)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-gateway-sdk
          path: bilbycast-gateway-sdk

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      # ── Build canonical manifest.json for the upgrade pipeline ──
      # The manifest binds (version, channel, sequence) to the just-built
      # `(arch, variant) → url + sha256` table. Gateways fetch this manifest
      # plus its Sigstore bundle on `upgrade_binary` and verify it before
      # downloading any tarball. See `bilbycast-gateway-sdk/src/upgrade/manifest.rs`
      # for the schema; the script lives at
      # `bilbycast-gateway-sdk/scripts/build-manifest.sh`.
      - name: Build manifest.json
        env:
          RELEASE_REPO: ${{ github.repository }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          # Sequence: monotonic per device_type. We use the GitHub Actions
          # `run_number` because it's monotonic across the workflow's
          # lifetime and re-runs share an attempt counter rather than
          # bumping the run_number. Gateways enforce
          # `manifest.sequence > state.last_sequence` so a replay attempt
          # with a stale signed manifest is rejected.
          SEQUENCE="${{ github.run_number }}"
          chmod +x bilbycast-gateway-sdk/scripts/build-manifest.sh
          # device_type=appear_x  matches `UpgradeProfile::device_type` in
          # `src/upgrade_profile.rs`. binary_prefix matches the tarball
          # naming convention.
          bilbycast-gateway-sdk/scripts/build-manifest.sh \
              "${VERSION}" "stable" "${SEQUENCE}" "artifacts" \
              "appear_x" "bilbycast-appear-x-api-gateway" \
              > artifacts/manifest.json
          echo "── manifest.json ──"
          cat artifacts/manifest.json
          echo

      # Install cosign so we can keyless-sign the manifest. Pinned to
      # the same version edge uses for trust-root parity.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      # Sign the manifest with Sigstore keyless. `cosign sign-blob`
      # requests a short-lived OIDC token from GitHub Actions, hands it
      # to Sigstore Fulcio for a 10-minute X.509 cert, generates an
      # ephemeral keypair, signs the manifest bytes, uploads the
      # signing event to Rekor, and emits the bundle. Gateways verify
      # the bundle against their compiled-in `ALLOWED_SIGNERS` allowlist.
      - name: Sign manifest (Sigstore keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cd artifacts
          cosign sign-blob --yes \
              --bundle manifest.sig.bundle \
              manifest.json
          echo "── manifest.sig.bundle (head) ──"
          head -c 512 manifest.sig.bundle
          echo

      - name: Verify cosign signature locally (paranoid check)
        run: |
          cd artifacts
          # Round-trip the signature via cosign verify-blob using the
          # same identity allowlist the gateway enforces. This catches
          # any mismatch between the workflow path and the allowlist
          # BEFORE we publish the release artefacts — better here than
          # in production rollback territory.
          cosign verify-blob \
              --bundle manifest.sig.bundle \
              --certificate-identity-regexp 'https://github\.com/Bilbycast/bilbycast-appear-x-api-gateway/\.github/workflows/nightly-release\.yml@refs/tags/v.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              manifest.json

      - name: Create tag and GitHub release
        working-directory: bilbycast-appear-x-api-gateway
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          VERSION="${{ needs.check-version.outputs.version }}"

          # Skip tag creation when the workflow was triggered by a tag
          # push (the tag already exists in that case).
          if ! git rev-parse "${TAG}" > /dev/null 2>&1; then
              git tag "${TAG}"
              git push origin "${TAG}"
          fi

          gh release create "${TAG}" \
            --title "bilbycast-appear-x-api-gateway v${VERSION}" \
            --notes "Release of bilbycast-appear-x-api-gateway version ${VERSION}.

          ## Binaries (static musl — no runtime dependencies)

          - \`bilbycast-appear-x-api-gateway-x86_64-linux.tar.gz\` — Linux x86_64 (amd64)
          - \`bilbycast-appear-x-api-gateway-aarch64-linux.tar.gz\` — Linux ARM64 (aarch64)

          Each tarball contains the binary, LICENSE / NOTICE / README, an example config under \`config/\`, and the operator install bundle under \`packaging/\` (systemd unit + sysusers + install / uninstall scripts).

          ## One-shot install

          \`\`\`
          curl -fsSL https://github.com/Bilbycast/bilbycast-appear-x-api-gateway/releases/latest/download/install-appear-x-gateway.sh \\\\
            | sudo bash -s -- \\\\
                --manager wss://manager.example.com:8443/ws/node \\\\
                --registration-token <token-from-manager-ui> \\\\
                --appear-x-address 192.168.1.100 \\\\
                --appear-x-username admin \\\\
                --appear-x-password <chassis-password>
          \`\`\`

          ## Verify checksums

          \`\`\`
          sha256sum -c *.sha256
          \`\`\`

          ## Remote upgrade

          This release is signed for keyless verification by the gateway's auto-upgrade pipeline. Once installed, operators using the manager UI's Upgrade button consume \`manifest.json\` + \`manifest.sig.bundle\` automatically. To verify a release manually:
          \`\`\`
          cosign verify-blob \\\\
              --bundle manifest.sig.bundle \\\\
              --certificate-identity-regexp 'https://github.com/Bilbycast/bilbycast-appear-x-api-gateway/.github/workflows/nightly-release.yml@refs/tags/v.*' \\\\
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \\\\
              manifest.json
          \`\`\`
          See \`bilbycast-gateway-sdk/docs/writing-a-gateway.md\` §9 for the full trust model." \
            ../artifacts/bilbycast-appear-x-api-gateway-x86_64-linux.tar.gz \
            ../artifacts/bilbycast-appear-x-api-gateway-x86_64-linux.tar.gz.sha256 \
            ../artifacts/bilbycast-appear-x-api-gateway-aarch64-linux.tar.gz \
            ../artifacts/bilbycast-appear-x-api-gateway-aarch64-linux.tar.gz.sha256 \
            ../artifacts/manifest.json \
            ../artifacts/manifest.sig.bundle \
            packaging/install-appear-x-gateway.sh \
            packaging/uninstall-appear-x-gateway.sh \
            packaging/bilbycast-appear-x-gateway.service

      - name: Prune old releases (keep latest 3)
        working-directory: bilbycast-appear-x-api-gateway
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Sort by publishedAt (release publication timestamp), not
          # createdAt (the underlying tag-commit date) — the latter is
          # unstable when multiple releases share the same target
          # commit, which can happen on cross-repo publishes. publishedAt
          # is monotonic per `gh release create` call.
          gh release list --limit 100 --json tagName,publishedAt \
            --jq 'sort_by(.publishedAt) | reverse | .[3:] | .[].tagName' \
            | while read -r OLD_TAG; do
                [ -z "$OLD_TAG" ] && continue
                echo "Deleting old release ${OLD_TAG}"
                gh release delete "${OLD_TAG}" --cleanup-tag --yes
              done
