# bilbycast-appear-x-api-gateway configuration

[manager]
# WebSocket URL for bilbycast-manager (must be wss://)
url = "wss://manager.example.com:8443/ws/node"

# One-time registration token (from manager's "Add Node" with device_type=appear_x)
# After first registration this is no longer needed — credentials are saved to credentials_file
registration_token = "your-registration-token-here"

# Where to store node_id + node_secret after registration
credentials_file = "credentials.json"

# Accept self-signed TLS certificates for manager connection
# Requires BILBYCAST_ALLOW_INSECURE=1 environment variable as safety guard
accept_self_signed_cert = false

# Optional: SHA-256 certificate fingerprint for cert pinning (colon-separated hex)
# cert_fingerprint = "ab:cd:ef:..."

[appear_x]
# IP address or hostname of the Appear X unit
address = "192.168.1.100"

# Login credentials for the Appear X JSON-RPC API
username = "admin"
password = ""

# Appear X units typically use self-signed HTTPS certificates
accept_self_signed_cert = true

[polling]
# Polling intervals in seconds
alarms_interval_secs = 10
chassis_interval_secs = 30
inputs_interval_secs = 15
outputs_interval_secs = 15
cards_interval_secs = 30

# MMI interface versions for the chassis-level endpoints. These vary across
# Appear firmware versions; the gateway logs "Method '...' was not found" if
# the configured version is wrong. Known-working values for the X5/X20 demo
# firmware tested 2026-04: alarms 2.8 / chassis 4.1 / cards 2.8.
alarms_mmi_version = "2.8"
chassis_mmi_version = "4.1"
cards_mmi_version = "2.8"

# NOTE: There is no per-board configuration. On startup the gateway runs a
# capability discovery pass against the unit (see src/appear_x/capabilities.rs)
# which:
#   1. Reads `cards/GetChassisInfo` to learn the chassis type (X5/X10/X20) and
#      the per-slot card name, serial, software_id, version, and feature list.
#   2. For each populated slot, probes the registry in
#      `src/appear_x/probe_registry.rs` to find which JSON-RPC interface
#      families this firmware actually exposes.
# Polling tasks are then spawned only for what discovery confirmed works, so
# slots whose card software uses an unknown namespace silently report through
# chassis-level polls only (alarms / chassisModel / cards) instead of spamming
# "Method not found" against unsupported endpoints.
